version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/taskflow
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-TASK_ADMIN_2026}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taskflow-network

  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - taskflow-network

volumes:
  mongo-data:
    driver: local

networks:
  taskflow-network:
    driver: bridge
